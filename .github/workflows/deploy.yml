name: Build and Deploy to Firebase (Legacy)

on:
  push:
    branches:
      - legacy-v1

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Frontend Dependencies
        run: npm install

      # --- OPRAVA: TOTO MUSÍ BYŤ POVOLENÉ PRE TAILWIND ---
      - name: Build CSS from Tailwind
        run: npm run build:css
      # ----------------------------------------------------

      - name: Install and Build Functions
        run: |
          cd functions
          npm install
          npm run build
          cd ..

      # --- Nasadenie Legacy verzie na PROD (via-academy-prod) ---
      # Tento krok sa spustí len pre vetvu legacy-v1 a pošle kód na alias 'prod'
      - name: Deploy Legacy to PROD (via-academy-prod)
        if: github.ref == 'refs/heads/legacy-v1'
        uses: w9jds/firebase-action@master
        with:
          args: deploy --project prod --force
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
